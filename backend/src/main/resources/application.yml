spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/archsim}
    username: ${DATABASE_USER:archsim}
    password: ${DATABASE_PASSWORD:archsim}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}
  # Behind a TLS-terminating reverse proxy / load balancer, trust the
  # X-Forwarded-* headers so generated URLs and HSTS reflect https.
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: archsim-backend
    version: 0.1.0

archsim:
  security:
    # Comma-separated list of browser origins allowed to call the API (CORS).
    # In production set ARCHSIM_ALLOWED_ORIGINS to your real domain(s).
    allowed-origins: ${ARCHSIM_ALLOWED_ORIGINS:http://localhost:5173}
    # HMAC signing secret for access tokens. MUST be overridden in production
    # with a long random value; the app refuses to start under the `prod`
    # profile while this is left at the insecure default.
    token-secret: ${ARCHSIM_TOKEN_SECRET:local-development-secret-change-me}
    # Auth rate limit: max requests per client IP per window (seconds).
    rate-limit:
      auth-requests: ${ARCHSIM_AUTH_RATE_LIMIT:20}
      window-seconds: ${ARCHSIM_AUTH_RATE_WINDOW:60}

