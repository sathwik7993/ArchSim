services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: archsim
      POSTGRES_USER: archsim
      POSTGRES_PASSWORD: archsim
    ports:
      - "5432:5432"
    volumes:
      - archsim-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archsim -d archsim"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/archsim
      DATABASE_USER: archsim
      DATABASE_PASSWORD: archsim
      PORT: "8080"
      ARCHSIM_TOKEN_SECRET: local-development-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  archsim-postgres:
